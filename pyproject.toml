[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B905",   # `zip()` without explicit `strict=`
    "SIM108", # ternary operator (can reduce readability)
    "RUF001", # ambiguous unicode chars in strings — project uses Chinese
    "RUF002", # ambiguous unicode chars in docstrings — project uses Chinese
    "RUF003", # ambiguous unicode chars in comments — project uses Chinese
    "RUF005", # iterable unpacking — tuple concat is idiomatic for tensor shapes
]

[tool.ruff.lint.isort]
known-first-party = ["python"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
